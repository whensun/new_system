name: CI/CD

permissions:
  contents: read
  pull-requests: write
  packages: read

"on": # needs to be quoted or else Psych treats this as true
  pull_request:
    branches:
      - main
  merge_group:
    types: [checks_requested]
  workflow_dispatch:
  push:
    branches:
      - main

env:
  DOCKER: 1
  DEPLOY_DIR: _site
  GITHUB_TOKEN: ${{ github.token }}

# cancel any prior actions from the same PR that are still running (we only care about the final commit)
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build-container:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - name: Clone Github Repo Action
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Get container tag
        run: |
          TAG=$(cat bin/.container-tag)
          echo "TAG=$TAG" >> $GITHUB_ENV

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772 # v3.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Check if container image exists in registry
        id: check-registry
        run: |
          if docker manifest inspect ghcr.io/riscv/udb:${{ env.TAG }} > /dev/null 2>&1; then
            echo "REGISTRY_HIT=true" >> $GITHUB_ENV
          else
            echo "REGISTRY_HIT=false" >> $GITHUB_ENV
          fi

      - name: Pull image from registry
        if: env.REGISTRY_HIT == 'true'
        run: |
          docker pull ghcr.io/riscv/udb:${{ env.TAG }}
          docker save ghcr.io/riscv/udb:${{ env.TAG }} -o ${{ runner.temp }}/docker_image.tar

      - name: Set up Docker Buildx
        if: env.REGISTRY_HIT == 'false'
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

      - name: Build and export
        if: env.REGISTRY_HIT == 'false'
        uses: docker/build-push-action@601a80b39c9405e50806ae38af30926f9d957c47 # v6.19.1
        with:
          push: false
          file: ./.devcontainer/Dockerfile
          platforms: linux/amd64
          tags: ghcr.io/riscv/udb:${{ env.TAG }}
          outputs: type=docker,dest=${{ runner.temp }}/docker_image.tar
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Upload container
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: docker_image
          path: ${{ runner.temp }}/docker_image.tar
  never-runs:
    # this just exists so that renovate can keep the download-artifact pointer up-to-date
    # we use it for regressions later
    runs-on: ubuntu-latest
    if: "false"
    steps:
      - name: Use download-artifact
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7
      - name: Use upload-artifact
        uses: actions/upload-artifact@47309c993abb98030a35d55ef7ff34b7fa1074b5 # v4.6.2
        with:
          path: .

  regress-pre-commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        # there are some symlinks in udb-gen that look broken without submodules
        with:
          submodules: "true"
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
      - uses: pre-commit/action@2c7b3805fd2a0fd8c1884dcaebf91fc102a13ecd # v3.0.1

  regress-llvm:
    runs-on: ubuntu-latest
    needs: [build-container, build-llvm]
    steps:
      - name: Clone Github Repo Action
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Download docker image
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7
        with:
          name: docker_image
          path: ${{ runner.temp }}
      - name: Load image
        run: docker load --input ${{ runner.temp }}/docker_image.tar
      - name: Get current LLVM submodule commit SHA
        id: get-llvm-sha
        run: echo "LLVM_SHA=$(git ls-tree HEAD ext/llvm-project | awk '{print $3}')" >> $GITHUB_ENV
      - name: Restore cache RISC-V JSON
        id: cache-riscv
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          path: ext/llvm-project/riscv.json
          key: ${{ runner.os }}-riscv-json-${{ env.LLVM_SHA }}
      - name: Test LLVM
        run: ./do test:llvm

  regress-find-configs:
    runs-on: ubuntu-latest
    needs: build-container
    outputs:
      configs: ${{ steps.configs.outputs.configs }}
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
      - name: Find configuration files
        id: configs
        run: |
          ruby -e "puts 'configs=[\"' + Dir.glob('cfgs/*.yaml').map { |f| File.basename(f, '.yaml') }.join('\", \"') + '\"]'" >> "$GITHUB_OUTPUT"

  regress-udb-cov-report:
    runs-on: ubuntu-latest
    needs: [build-container, regress-udb-unit-test]
    steps:
      - name: Clone Github Repo Action
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Download docker image
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7
        with:
          name: docker_image
          path: ${{ runner.temp }}
      - name: Load image
        run: docker load --input ${{ runner.temp }}/docker_image.tar
      - name: download coverage
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7
        with:
          pattern: udb-*-cov
          path: _cov/udb
          merge-multiple: true
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Collate coverage
        run: ./do chore:udb:collate_cov[_cov/udb]
      - name: Upload udb coverage reports to Codecov
        uses: codecov/codecov-action@671740ac38dd9b0130fbe1cec585b89eea48d3de # v5.5.2
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          disable_search: true
          files: tools/ruby-gems/udb/coverage/coverage.xml
          flags: udb

  build-llvm:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository (no submodules, shallow fetch)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: false
          fetch-depth: 1
      - name: Get current LLVM submodule commit SHA
        id: get-llvm-sha
        run: echo "LLVM_SHA=$(git ls-tree HEAD ext/llvm-project | awk '{print $3}')" >> $GITHUB_ENV
      - name: Cache RISC-V JSON
        id: cache-riscv
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          path: ext/llvm-project/riscv.json
          key: ${{ runner.os }}-riscv-json-${{ env.LLVM_SHA }}
      - name: Initialize LLVM submodule (shallow + sparse)
        if: ${{ steps.cache-riscv.outputs.cache-hit != 'true' }}
        run: |
          rm -rf ext/llvm-project
          git submodule sync --recursive
          git submodule update --init --recursive --depth=1 ext/llvm-project
      - name: Check for required directories and files
        if: ${{ steps.cache-riscv.outputs.cache-hit != 'true' }}
        run: |
          ls -l ext/llvm-project/llvm/include
          ls -l ext/llvm-project/llvm/lib/Target/RISCV
          ls -l ext/llvm-project/llvm/lib/Target/RISCV/RISCV.td
      - name: Configure and build llvm-tblgen
        if: ${{ steps.cache-riscv.outputs.cache-hit != 'true' }}
        run: |
          cmake -S ext/llvm-project/llvm -B ext/llvm-project/build -DCMAKE_BUILD_TYPE=Release
          cmake --build ext/llvm-project/build --target llvm-tblgen
      - name: Generate RISC-V JSON
        if: ${{ steps.cache-riscv.outputs.cache-hit != 'true' }}
        run: |
          chmod +x ./ext/llvm-project/build/bin/llvm-tblgen
          ./ext/llvm-project/build/bin/llvm-tblgen \
            -I ext/llvm-project/llvm/include \
            -I ext/llvm-project/llvm/lib/Target/RISCV \
            ext/llvm-project/llvm/lib/Target/RISCV/RISCV.td \
            --dump-json \
            -o ext/llvm-project/riscv.json
      - name: Show riscv.json output
        run: ls -l ext/llvm-project/riscv.json
      - name: Upload RISC-V JSON as Artifact
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: riscv-json
          path: ext/llvm-project/riscv.json

  java-tests:
    name: Java (Xtext) tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tools/eclipse/dev/org.xtext.udb.parent
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Setup Temurin JDK 21
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      - name: Build & test (whole reactor)
        working-directory: tools/eclipse/dev/org.xtext.udb.parent
        env:
          MAVEN_OPTS: "-Djdk.xml.maxGeneralEntitySizeLimit=0 -Djdk.xml.totalEntitySizeLimit=0 -Djdk.xml.entityExpansionLimit=0"
        run: mvn -B -U -Dheadless=true verify
      - name: Archive surefire reports (always)
        if: always()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: surefire-reports
          path: |
            **/target/surefire-reports/*.xml
            **/target/surefire-reports/*.txt

  vscode-tests:
    name: VS Code Mocha tests
    runs-on: ubuntu-latest
    needs: java-tests
    defaults:
      run:
        working-directory: tools/eclipse/udb-vscode
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: tools/eclipse/udb-vscode/package-lock.json
      - name: Setup Temurin JDK 21 (for LS)
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: "21"
      - name: Install deps
        run: npm ci
      - name: Compile
        run: npm run compile
      - name: Run VS Code tests
        run: xvfb-run -a npm test
      - name: Archive VS Code test logs (always)
        if: always()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: vscode-test-logs
          path: |
            tools/eclipse/udb-vscode/.vscode-test/**/*
            tools/eclipse/udb-vscode/out/test/**/*

  create-gems:
    name: Create the gems
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        gem: [idlc, udb, udb_helpers]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Copy the gem directory to resolve symlinks
        run: cp -L -r tools/ruby-gems/${{ matrix.gem }} gem-build-dir
      - name: Create the ${{ matrix.gem }} gem
        run: |
          cd gem-build-dir && \
          gem build -o ${{ matrix.gem }}.gem ${{ matrix.gem }}.gemspec
      - name: Upload the ${{ matrix.gem }} gem
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: ${{ matrix.gem }}.gem
          path: gem-build-dir/${{ matrix.gem }}.gem

  udb-gem-z3:
    name: Test udb gem using z3 across several distros and platforms
    strategy:
      fail-fast: false
      matrix:
        platform:
          - ubuntu-24.04
          - ubuntu-24.04-arm
        container:
          - almalinux:8
          - ruby:3-slim
    runs-on: ${{ matrix.platform }}
    container: ${{ matrix.container }}
    needs: create-gems
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - if: matrix.container == 'almalinux:8'
        name: Install ruby
        run: |
          dnf module enable -y ruby:3.3
          dnf install -y ruby ruby-devel gcc-toolset-12
          PRE="source scl_source enable gcc-toolset-12"
          echo "PRE=$PRE" >> $GITHUB_ENV
      - if: matrix.container == 'ruby:3-slim'
        name: Install make
        run: |
          apt-get update -qq && \
          apt-get install --no-install-recommends -y make
      - name: download udb gem
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7
        with:
          name: udb.gem
      - name: download idlc gem
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7
        with:
          name: idlc.gem
      - name: download udb_helpers gem
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7
        with:
          name: udb_helpers.gem
      - name: install gems
        run: |
          $PRE && \
          gem install idlc.gem && \
          gem install udb_helpers.gem && \
          gem install udb.gem
      - name: try z3
        run: ruby -r 'udb' -e "Udb::Z3Loader.ensure_z3_loaded"
